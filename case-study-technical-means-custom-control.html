<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Митний Симулятор: Мультикейс (3 Сценарії)</title>
    <style>
      :root {
        --primary: #1e3a8a;
        --primary-hover: #172554;
        --success: #16a34a;
        --warning: #ca8a04;
        --danger: #dc2626;
        --bg-dark: #0f172a;
        --bg-light: #f8fafc;
        --text-main: #334155;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #f1f5f9;
        color: var(--text-main);
        line-height: 1.6;
        padding: 20px;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1),
          0 2px 4px -2px rgb(0 0 0 / 0.1);
      }

      header {
        text-align: center;
        border-bottom: 3px solid var(--primary);
        padding-bottom: 15px;
        margin-bottom: 25px;
      }

      header h1 {
        color: var(--primary);
        font-size: 24px;
      }

      /* Екран вибору кейсу */
      .menu-zone {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        padding: 20px 10px;
      }

      .case-card {
        background: #fff;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        padding: 20px;
        width: 100%;
        max-width: 700px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
      }

      .case-card:hover {
        border-color: var(--primary);
        background-color: #eff6ff;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgb(0 0 0 / 0.05);
      }

      .case-card h3 {
        color: var(--primary);
        margin-bottom: 8px;
      }

      /* Матеріали справи */
      .case-materials {
        display: none;
        background-color: var(--bg-light);
        border-left: 4px solid var(--primary);
        padding: 15px;
        margin-bottom: 25px;
        border-radius: 0 8px 8px 0;
      }

      .case-materials h3 {
        color: var(--primary);
        margin-bottom: 10px;
      }

      .materials-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        font-size: 14px;
      }

      @media (max-width: 768px) {
        .materials-grid {
          grid-template-columns: 1fr;
        }
      }

      .material-block {
        background: #fff;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        background: #e2e8f0;
        border-radius: 4px;
        font-weight: bold;
        font-size: 12px;
      }

      /* Ігрова зона */
      .game-zone {
        display: none;
        border: 2px dashed #cbd5e1;
        padding: 20px;
        border-radius: 8px;
        background-color: #fafafa;
      }

      .level-title {
        font-size: 18px;
        font-weight: bold;
        color: var(--primary);
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .quest-text {
        font-size: 16px;
        margin-bottom: 20px;
        font-weight: 500;
      }

      .options-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option-btn {
        background-color: #fff;
        border: 2px solid #e2e8f0;
        padding: 15px;
        border-radius: 8px;
        text-align: left;
        cursor: pointer;
        font-size: 15px;
        transition: all 0.2s ease;
      }

      .option-btn:hover {
        border-color: var(--primary);
        background-color: #eff6ff;
        transform: translateY(-1px);
      }

      /* Вікно результату */
      .result-box {
        display: none;
        margin-top: 20px;
        padding: 20px;
        border-radius: 8px;
        animation: fadeIn 0.4s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-box.success {
        background-color: #f0fdf4;
        border: 2px solid var(--success);
        color: #14532d;
      }
      .result-box.warning {
        background-color: #fefce8;
        border: 2px solid var(--warning);
        color: #713f12;
      }
      .result-box.danger {
        background-color: #fef2f2;
        border: 2px solid var(--danger);
        color: #7f1d1d;
      }

      .result-title {
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .action-btn {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
        margin-right: 10px;
      }

      .btn-next {
        background-color: var(--success);
      }
      .btn-next:hover {
        background-color: #15803d;
      }
      .btn-restart {
        background-color: var(--danger);
      }
      .btn-restart:hover {
        background-color: #b91c1c;
      }
      .btn-menu {
        background-color: #64748b;
      }
      .btn-menu:hover {
        background-color: #475569;
      }
    </style>
  </head>

      let activeCaseId = null;

      const menuZone = document.getElementById("menu-zone");
      const caseMaterials = document.getElementById("case-materials");
      const materialsGrid = document.getElementById("materials-grid");
      const gameZone = document.getElementById("game-zone");

      const subHeaderEl = document.getElementById("sub-header");
      const levelTitleEl = document.getElementById("level-title");
      const questTextEl = document.getElementById("quest-text");
      const optionsListEl = document.getElementById("options-list");

      const resultBoxEl = document.getElementById("result-box");
      const resultTitleEl = document.getElementById("result-title");
      const resultTextEl = document.getElementById("result-text");
      const actionBtnEl = document.getElementById("action-btn");

      function startCase(caseId) {
        activeCaseId = caseId;
        const currentCase = casesData[caseId];

        // Оновлюємо шапку та ховаємо меню
        subHeaderEl.innerText = currentCase.subHeader;
        menuZone.style.display = "none";

        // Генеруємо матеріали справи
        materialsGrid.innerHTML = "";
        currentCase.materials.forEach((htmlContent) => {
          const block = document.createElement("div");
          block.className = "material-block";
          block.innerHTML = htmlContent;
          materialsGrid.appendChild(block);
        });
        caseMaterials.style.display = "block";

        // Показуємо ігрову зону та завантажуємо 1 рівень
        gameZone.style.display = "block";
        loadLevel(1);
      }

      function loadLevel(level) {
        currentLevel = level;
        resultBoxEl.style.display = "none";
        optionsListEl.style.display = "flex";

        const levelData = casesData[activeCaseId].steps[level];
        levelTitleEl.innerText = levelData.title;
        questTextEl.innerText = levelData.text;

        optionsListEl.innerHTML = "";
        levelData.options.forEach((option, index) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.innerText = option.text;
          btn.onclick = () => selectOption(index);
          optionsListEl.appendChild(btn);
        });
      }

      function selectOption(index) {
        const option =
          casesData[activeCaseId].steps[currentLevel].options[index];
        optionsListEl.style.display = "none";

        resultBoxEl.className = `result-box ${option.status}`;
        resultTitleEl.innerText = option.title;
        resultTextEl.innerText = option.desc;
        resultBoxEl.style.display = "block";

        if (option.next === "restart") {
          actionBtnEl.className = "action-btn btn-restart";
          actionBtnEl.innerText = "Почати кейс заново";
          actionBtnEl.onclick = () => loadLevel(1);
        } else if (option.next === "end") {
          actionBtnEl.className = "action-btn btn-next";
          actionBtnEl.innerText = "Повернутися до меню";
          actionBtnEl.onclick = () => goToMenu();
        } else {
          actionBtnEl.className = "action-btn btn-next";
          actionBtnEl.innerText = "Продовжити";
          actionBtnEl.onclick = () => loadLevel(option.next);
        }
      }

      function goToMenu() {
        activeCaseId = null;
        currentLevel = 1;

        subHeaderEl.innerText = "Оберіть практичний кейс для початку навчання";
        menuZone.style.display = "flex";
        caseMaterials.style.display = "none";
        gameZone.style.display = "none";
        resultBoxEl.style.display = "none";
      }
